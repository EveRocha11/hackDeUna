<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deuna Negocios – Menú</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="phone-container">

      <!-- ===== HEADER (sin pestañas en esta pantalla) ===== -->
      <header class="app-header">
        <div class="header-top">

          <div class="user-info">
            <div class="avatar">J</div>
            <div class="user-text">
              <div class="user-name">
                Hola! Jose
                <span class="badge-admin">Admin</span>
              </div>
              <div class="user-sub">Rocha Tenelema Jose Aug...</div>
            </div>
          </div>

          <div class="header-actions">
            <button class="icon-btn" title="Escanear QR">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="3" height="3"/>
                <rect x="18" y="14" width="3" height="3"/>
                <rect x="14" y="18" width="3" height="3"/>
                <rect x="18" y="18" width="3" height="3"/>
              </svg>
            </button>
            <button class="icon-btn" title="Notificaciones">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </button>
            <button class="icon-btn" title="Soporte">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
                <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Título de sección -->
        <div class="page-title-bar">
          <span class="page-title">Menú</span>
        </div>
      </header>
      <!-- /HEADER -->


      <!-- ===== CONTENIDO ===== -->
      <main class="content-area">
        <div class="page-content">

          <!-- Opciones del menú -->
          <div class="card">
            <ul class="menu-list">

              <li class="menu-item">
                <div class="menu-icon-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                       stroke="#4B2C81" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                </div>
                <span class="menu-label">Mi perfil</span>
                <span class="chevron">&#8250;</span>
              </li>

              <li class="menu-item">
                <div class="menu-icon-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                       stroke="#4B2C81" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                  </svg>
                </div>
                <span class="menu-label">Mis dispositivos</span>
                <span class="chevron">&#8250;</span>
              </li>

              <li class="menu-item">
                <div class="menu-icon-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                       stroke="#4B2C81" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                  </svg>
                </div>
                <span class="menu-label">Soporte</span>
                <span class="chevron">&#8250;</span>
              </li>

              <li class="menu-item">
                <div class="menu-icon-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                       stroke="#4B2C81" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  </svg>
                </div>
                <span class="menu-label">Seguridad</span>
                <span class="chevron">&#8250;</span>
              </li>

              <li class="menu-item">
                <div class="menu-icon-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                       stroke="#4B2C81" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </div>
                <span class="menu-label">Configuración</span>
                <span class="chevron">&#8250;</span>
              </li>

            </ul>
          </div>

          <!-- Botón cerrar sesión -->
          <button class="btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Cerrar sesión
          </button>

        </div>
      </main>
      <!-- /CONTENIDO -->


      <!-- ===== BARRA DE NAVEGACIÓN INFERIOR ===== -->
      <nav class="bottom-nav">
        <a class="nav-item" href="index.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Inicio</span>
        </a>

        <a class="nav-item" href="caja.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <span>Mi Caja</span>
        </a>

        <!-- Menú: activo en esta página -->
        <a class="nav-item active" href="menu.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          <span>Menú</span>
        </a>

        <a class="nav-item" href="asistente.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M12 2c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>
          </svg>
          <span>Asistente</span>
        </a>
      </nav>
      <!-- /BOTTOM NAV -->

    </div>
  </div>

  <!-- No se necesita app.js en esta página -->
</body>
</html>
