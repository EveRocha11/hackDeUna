<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>deuna! Negocios — Splash</title>
  <link rel="stylesheet" href="splash.css" />
  <script src="splash.js" defer></script>
</head>
<body>
  <div class="viewport">
    <div class="device" aria-label="Dispositivo">
      <div class="phone" role="application" aria-label="deuna! Negocios">
        <section class="screen" aria-label="Splash Screen">
          <header class="statusbar" aria-label="Barra de estado">
            <div class="statusbar__left" aria-label="Estado izquierdo">
              <span class="time" aria-label="Hora">09:52</span>
            </div>
            <div class="statusbar__right" aria-label="Estado derecho">
              <span class="battery" aria-label="Batería">
                <svg viewBox="0 0 30 16" aria-hidden="true" focusable="false">
                  <rect x="1" y="3" width="24" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.9" />
                  <rect x="26" y="6" width="3" height="4" rx="1" fill="currentColor" opacity="0.9" />
                  <rect x="3" y="5" width="15.5" height="6" rx="1.2" fill="currentColor" opacity="0.9" />
                </svg>
                <span aria-label="Porcentaje de batería">68%</span>
              </span>
            </div>
          </header>

          <main class="splash-main">
            <section class="brand" aria-label="Marca">
              <h1 class="logo">deuna!</h1>
              <button class="cta" type="button" aria-label="Negocios">Negocios</button>
            </section>
          </main>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
