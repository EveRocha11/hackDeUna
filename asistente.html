<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deuna Negocios – Asistente</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/asistente.css" />
  <script src="js/app.js" defer></script>
</head>
<body>

  <div class="page-wrapper">
    <div class="phone-container">

      <!-- ===== HEADER (sin pestañas en esta pantalla) ===== -->
      <header class="app-header">
        <div class="header-top">

          <div class="user-info">
            <div class="avatar">J</div>
            <div class="user-text">
              <div class="user-name">
                Hola! Jose
                <span class="badge-admin">Admin</span>
              </div>
              <div class="user-sub">Rocha Tenelema Jose Aug...</div>
            </div>
          </div>

          <div class="header-actions">
            <button class="icon-btn" title="Escanear QR">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="3" height="3"/>
                <rect x="18" y="14" width="3" height="3"/>
                <rect x="14" y="18" width="3" height="3"/>
                <rect x="18" y="18" width="3" height="3"/>
              </svg>
            </button>
            <button class="icon-btn" title="Notificaciones">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </button>
            <button class="icon-btn" title="Soporte">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
                <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Título de sección -->
        <div class="page-title-bar">
          <span class="page-title">Asistente de Voz</span>
        </div>
      </header>
      <!-- /HEADER -->


      <!-- ===== CONTENIDO ===== -->
      <main class="content-area">
        <div class="page-content asistente-content">

          <!-- Contenedor de conversación -->
          <div class="asistente-chat">
            <div class="chat-message bot-message">
              <img class="chat-avatar" src="img/duni.jpeg" alt="Avatar del asistente" />
              <div class="chat-bubble">
                <p>Hola! Soy tu asistente de voz. ¿Cómo puedo ayudarte hoy?</p>
              </div>
            </div>
          </div>

          <!-- Área de entrada de voz -->
          <div class="asistente-input">
            <button class="btn-voice" title="Grabar voz">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="9" y="2" width="6" height="12" rx="3" />
                <path d="M5 11v1a7 7 0 0 0 14 0v-1" />
                <path d="M12 19v3" />
                <path d="M9 22h6" />
              </svg>
            </button>
            <div class="asistente-input-field">
              <input type="text" class="asistente-text-input" placeholder="Escribe tu pregunta..." />
              <button class="btn-send" type="button" title="Enviar" aria-label="Enviar mensaje">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 18V6" />
                  <path d="M7 11l5-5 5 5" />
                </svg>
              </button>
            </div>
          </div>

        </div>
      </main>
      <!-- /CONTENIDO -->


      <!-- ===== BARRA DE NAVEGACIÓN INFERIOR ===== -->
      <nav class="bottom-nav">
        <a class="nav-item" href="index.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Inicio</span>
        </a>

        <a class="nav-item" href="caja.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <span>Mi Caja</span>
        </a>

        <a class="nav-item" href="menu.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          <span>Menú</span>
        </a>

        <!-- Asistente: activo en esta página -->
        <a class="nav-item active" href="asistente.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M12 2c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>
          </svg>
          <span>Asistente</span>
        </a>
      </nav>
      <!-- /BOTTOM NAV -->

    </div>
  </div>

</body>
</html>
